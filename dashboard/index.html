<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quorum — calibrated treasury council on Casper</title>
<style>
  :root {
    --bg: #0c0f14; --panel: #141a23; --panel2: #1a2230; --line: #26303f;
    --text: #dce5f0; --dim: #8295ab; --accent: #4cc2ff;
    --approve: #34d399; --trim: #fbbf24; --escalate: #f87171; --abstain: #94a3b8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 "Segoe UI", system-ui, sans-serif; }
  header { padding: 22px 28px; border-bottom: 1px solid var(--line);
           display: flex; align-items: baseline; gap: 14px; }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .04em; }
  header .sub { color: var(--dim); font-size: 13px; }
  main { max-width: 1080px; margin: 0 auto; padding: 24px 28px 80px; }
  .run { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
         margin-bottom: 22px; overflow: hidden; }
  .run-head { display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
              padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .badge { font-weight: 700; font-size: 12px; padding: 3px 10px; border-radius: 99px;
           letter-spacing: .06em; }
  .badge.APPROVE { background: #0c3d2c; color: var(--approve); }
  .badge.TRIM { background: #3d310c; color: var(--trim); }
  .badge.ESCALATE { background: #3d0f0c; color: var(--escalate); }
  .badge.ABSTAIN_UPHELD { background: #232b36; color: var(--abstain); }
  .req-id { font-family: Consolas, monospace; color: var(--accent); }
  .ran-at { color: var(--dim); font-size: 12px; margin-left: auto; }
  .intent { padding: 12px 18px; color: var(--dim); font-style: italic;
            border-bottom: 1px solid var(--line); }
  .agents { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px; padding: 16px 18px; }
  .agent { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
           padding: 12px 14px; }
  .agent h3 { margin: 0 0 6px; font-size: 11px; letter-spacing: .12em; color: var(--accent);
              text-transform: uppercase; }
  .agent .note { font-size: 13px; }
  .metrics { display: flex; flex-wrap: wrap; gap: 18px; padding: 4px 18px 14px; }
  .metric { font-size: 12px; color: var(--dim); }
  .metric b { display: block; font-size: 15px; color: var(--text); }
  .trail { padding: 0 18px 16px; }
  .trail h4 { margin: 10px 0 6px; font-size: 11px; letter-spacing: .12em;
              text-transform: uppercase; color: var(--dim); }
  .hash, .src { font-family: Consolas, monospace; font-size: 12px; color: var(--dim);
                word-break: break-all; }
  .src .pay { color: var(--trim); }
  .tx a { color: var(--accent); text-decoration: none; font-family: Consolas, monospace;
          font-size: 13px; }
  .tx a:hover { text-decoration: underline; }
  .none { color: var(--dim); padding: 40px; text-align: center; }
  .findings { margin: 4px 0 0; padding-left: 18px; color: var(--dim); font-size: 12.5px; }
</style>
</head>
<body>
<header>
  <h1>QUORUM</h1>
  <span class="sub">calibrated multi-agent treasury council · Casper Testnet audit trail</span>
</header>
<main id="app"><div class="none">loading runs…</div></main>
<script>
const pct = (x) => (x * 100).toFixed(1) + "%";

function agentCard(msg) {
  return `<div class="agent"><h3>${msg.agent}</h3><div class="note">${esc(msg.note)}</div></div>`;
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

function renderRun(run) {
  const d = run.deliberation;
  const txs = (run.transactions || []).map((t) =>
    `<div class="tx">${t.kind}: <a href="${t.explorerUrl}" target="_blank">${t.txHash}</a></div>`
  ).join("") || `<div class="src">no on-chain submission for this run${run.chainError ? " — " + esc(run.chainError) : ""}</div>`;

  const sources = d.evidence.sources.map((s) =>
    `<div class="src">[${s.kind}] ${esc(s.name)} · sha256 ${s.payloadSha256.slice(0, 20)}…` +
    (s.paymentRef ? ` · <span class="pay">paid ${esc(s.paymentRef.slice(0, 40))}…</span>` : "") + `</div>`
  ).join("");

  const findings = d.gate.findings.map((f) => `<li>${esc(f)}</li>`).join("");

  return `<section class="run">
    <div class="run-head">
      <span class="badge ${d.verdict}">${d.verdict.replace("_", " ")}</span>
      <span class="req-id">${esc(run.requestId)}</span>
      <span class="ran-at">${new Date(run.ranAt).toLocaleString()}</span>
    </div>
    <div class="intent">“${esc(d.proposal.intent)}”</div>
    <div class="agents">${d.messages.map(agentCard).join("")}</div>
    <div class="metrics">
      <span class="metric">portfolio vol<b>${pct(d.risk.portfolioVol)}</b></span>
      <span class="metric">drawdown bound (30d/99%)<b>${pct(d.risk.drawdownBound)}</b></span>
      <span class="metric">HHI<b>${d.risk.hhi.toFixed(3)}</b></span>
      <span class="metric">turnover<b>${pct(d.risk.turnover)}</b></span>
      <span class="metric">calibrated p<b>${d.calibration.probability.toFixed(3)}</b></span>
      <span class="metric">confidence<b>${d.calibration.confidence.toFixed(3)}</b></span>
      <span class="metric">execution<b>${pct(d.gate.executionFraction)}</b></span>
    </div>
    <div class="trail">
      <h4>reviewer findings</h4><ul class="findings">${findings}</ul>
      <h4>evidence sources</h4>${sources}
      <h4>audit hashes</h4>
      <div class="hash">evidence&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${d.evidence.packetSha256}</div>
      <div class="hash">deliberation ${d.deliberationSha256}</div>
      <h4>on-chain transactions</h4>${txs}
    </div>
  </section>`;
}

async function load() {
  const app = document.getElementById("app");
  try {
    const runs = await (await fetch("/api/runs")).json();
    app.innerHTML = runs.length
      ? runs.map(renderRun).join("")
      : `<div class="none">No runs yet — try <code>npm run demo</code> in orchestrator/.</div>`;
  } catch (e) {
    app.innerHTML = `<div class="none">failed to load: ${esc(e)}</div>`;
  }
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
